services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '1024M'

  redis:
    image: redis:7-alphine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z-alpine
    restart: always
    environment:
      MINIO_ROOT_USER: user
      MINIO_ROOT_PASSWORD: 1234
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    command: server/data

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentic/cp-kafka:7.6.1
    networks:
      - kafka_network
    restart: always
    environment:
      #Node
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker, controller
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      #Network
      KAFKA_LISTENER: PLAINTEXT://:9092, EXTERNAL://:9094, CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENER: PLAINTEXT://kafka:9092, EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT, PLAINTEXT:PLAINTEXT, EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      #Quorum
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      #Replication
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALENCE_DELAY_MS: 0

    ports:
      - "9094:9094"

    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s


  registration-service:
    build:
      context: .
      dockerfile: ./registration-service/Dockerfile
    restart: always
    environment:
      KAFKA_DOCKER_URL: kafka:9092
      POSTGRES_REGISTRATION_DOCKER_URL: postgresql://postgres:5432/registration_db
      POSTGRES_CORE_DOCKER_URL: postgresql://postgres:5432/core_db
      REDIS_DOCKER_HOST: redis
      REDIS_DOCKER_PORT: 6379
      MINIO_DOCKER_URL: http://minio:9000
    ports:
      - "8081:8081"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  redis:
  minio_data:

networks:
  kafka_network:
    - driver: bridge